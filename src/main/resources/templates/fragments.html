<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- FRAGMENTO NAVBAR -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarMenu"
                    aria-controls="navbarMenu"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/catalogo}">Catálogo</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- FRAGMENTO FOOTER -->
    <footer th:fragment="footer" class="footer-placas">
        <p class="mb-0">© 2026 La Casa de la Placa — Todos los derechos reservados |
            Desarrollado por <strong>Fidelitas, Grupo #7</strong></p>
    </footer>

</body>



<!-- Fragmento Login -->
<section th:fragment="login" class="vh-100 d-flex justify-content-center align-items-center"
         style="background-image:url('/img/marmol.jpg'); background-size:cover; background-position:center;">

    <div class="text-center">

        <img th:src="@{/img/logo.png}" style="width:220px; margin-bottom:20px;">

        <form class="d-flex flex-column align-items-center">

            <div class="mb-3" style="width:320px;">
                <label class="form-label fw-bold text-start w-100">Nombre de usuario</label>
                <input type="text" class="form-control" 
                       style="background-color:#d9d9d9; border:none; height:45px;">
            </div>

            <div class="mb-3" style="width:320px;">
                <label class="form-label fw-bold text-start w-100">Contraseña</label>
                <input type="password" class="form-control" 
                       style="background-color:#d9d9d9; border:none; height:45px;">
            </div>

            <button class="btn text-white fw-bold"
                    style="background-color:#8a6a1e; border-radius:25px; padding:8px 40px;">
                Ingresar
            </button>

            <div class="mt-3">
                <a href="#" style="color:#8a6a1e; text-decoration:none; display:block;">
                    Olvidé mi contraseña
                </a>
                <a href="#" style="color:#8a6a1e; text-decoration:none; display:block;">
                    Registrarse
                </a>
            </div>

        </form>

    </div>

</section>
</html>
