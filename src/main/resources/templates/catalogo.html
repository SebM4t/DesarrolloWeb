<!DOCTYPE html>

<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Catálogo — La Casa de la Placa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
    <body>
       <nav th:replace="~{fragments :: navbar}"></nav>
        
       
       <!-- Contenido Catalogo-->
    <div class="container mt-4">

        <h2 class="mb-4 fw-bold">Catálogo de Placas</h2>

        <!-- Filtro Categoria-->
        <div class="mb-4">
            <a th:href="@{/catalogo}"
               class="btn btn-sm me-2"
               th:classappend="${categoriaSeleccionada == null} ? 'btn-dark' : 'btn-outline-dark'">
                Todas
            </a>
            <a th:each="cat : ${categorias}"
               th:href="@{/catalogo(categoriaId=${cat.id})}"
               class="btn btn-sm me-2"
               th:classappend="${categoriaSeleccionada == cat.id} ? 'btn-dark' : 'btn-outline-dark'"
               th:text="${cat.nombre}">
            </a>
        </div>

        <!-- Listado Placas -->
        <div class="row g-4">
            <div class="col-md-4" th:each="placa : ${placas}">
                <div class="card h-100 shadow-sm">

                    <!-- IMAGEN -->
                    <div class="card-img-top bg-secondary d-flex align-items-center
                                justify-content-center" style="height: 180px;">
                        <img th:if="${placa.imagenNombre != null}"
                             th:src="@{'/img/placas/' + ${placa.imagenNombre}}"
                             class="img-fluid h-100 w-100"
                             style="object-fit: cover;"
                             th:alt="${placa.nombre}"/>
                        <span th:if="${placa.imagenNombre == null}"
                              class="text-white">Sin imagen</span>
                    </div>

                    <!-- INFO -->
                    <div class="card-body">
                        <h5 class="card-title fw-bold" th:text="${placa.nombre}"></h5>
                        <p class="card-text text-muted" th:text="${placa.descripcion}"></p>
                        <ul class="list-unstyled mb-0">
                            <li><strong>Material:</strong>
                                <span th:text="${placa.material}"></span></li>
                            <li><strong>Tamaño:</strong>
                                <span th:text="${placa.tamanio}"></span></li>
                            <li><strong>Precio:</strong>
                                ₡<span th:text="${placa.precio}"></span></li>
                        </ul>
                    </div>

                    <!-- Boton detalle-->
                    <div class="card-footer bg-white border-0">
                        <a th:href="@{'/catalogo/' + ${placa.id}}"
                           class="btn btn-catalogo w-100">Ver detalle</a>
                    </div>

                </div>
            </div>
        </div>

        <!-- Mensaje si no hay placas -->
        <div th:if="${#lists.isEmpty(placas)}" class="text-center mt-5">
            <p class="text-muted">No hay placas disponibles en esta categoría.</p>
        </div>

    </div>
    
       
       <footer th:replace="~{fragments :: footer}"></footer>
    </body>
</html>
