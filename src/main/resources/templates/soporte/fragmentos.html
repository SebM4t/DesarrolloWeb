
<section th:fragment="agregar" class="container-fluid mt-3">
    <div class="row">
        <div class="col-md-7">
            <div class="card w-100 border-0" style="background-color: #E2B844; border-radius: 10px;">
                <div class="card-body p-4" sec:authorize="hasAuthority('USER')">
                    <h5 class="card-title text-center mb-4" style="font-weight: bold;">Formulario de Contacto</h5>
                    <br/>
                    <form th:action='@{/soporte/guardar}' th:object='${soporte}' class='was-validated' method="post">
                        <div class="modal-body">
                            <div class='mb-3'>
                                <label class="fw-bold">Nombre Completo</label>
                                <input type="text" name='nombreCompleto' class='form-control' required/>
                            </div>
                            <div class='mb-3'>
                                <label class="fw-bold">Teléfono</label>
                                <input type="text" name='telefono' class='form-control' required/>
                            </div>
                            <div class='mb-3'>
                                <label class="fw-bold">Correo</label>
                                <input type="text" name='correo' class='form-control' required/>
                            </div>

                            <div class='mb-3'>
                                <label class="fw-bold">Mensaje</label>
                                <textarea name='mensajeSoporte' class='form-control' required></textarea>
                            </div>

                            <div class="modal-footer">
                                <button type="submit" class="btn btn-success w-100">ENVIAR FORMULARIO</button>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>

<section th:fragment="verMensaje" class="container-fluid mt-3">
    <div class="row">
        <div class="col-md-7">
            <div class="card w-100 border-0" style="background-color: #E2B844; border-radius: 10px;">
                <div class="card-body p-4" sec:authorize="hasAuthority('ADMIN')">
                    <h5 class="card-title text-center mb-4" style="font-weight: bold;">Mensajes de Soporte</h5>
                    <div th:if="${soportes != null and !soportes.empty}">
                        <div class="mb-4 p-3 shadow-sm rounded border" th:each="s : ${soportes}" style="background-color: #fcebb6; border-radius: 10px;">
                            <div class='mb-3'>
                                <h6 class="card-subtitle mb-2" style="font-weight: bold;" th:text="${s.nombreCompleto}"></h6>
                                <p class="card-subtitle mb-2"><strong>Contacto:</strong> [[${s.telefono}]] | [[${s.correo}]]</p>
                                </br>
                                <p class="card-subtitle mb-2" style="font-weight: bold;">Mensaje:</p>
                                <p class="card-subtitle mb-2" >[[${s.mensajeSoporte}]]</p>
                            </div>
                            <div class="text-end mt-2">
                                <button type="button" class="btn btn-danger"
                                        data-bs-toggle="modal" data-bs-target="#confirmModal"
                                        th:data-bs-id="${s.idSoporte}"
                                        th:data-bs-descripcion="${s.mensajeSoporte}">
                                    <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{soporte/fragmentos :: confirmarEliminar}"></div>
</section>

<section th:fragment="confirmarEliminar">
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/soporte/eliminar}" method="post">

                    <input type="hidden" name="idSoporte" id="modalId" value=""/>

                    <div class="modal-header bg-warning text-dark">
                        <h5 class="modal-title">Confirmar Acción</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Seguro que quieres eliminar el mensaje?</p>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
