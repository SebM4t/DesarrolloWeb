
<section th:fragment="agregar">
    <div class="row py-4 mb-3">
        <div class="col-md-12 text-center" sec:authorize="hasRole('ADMIN')">
            <button type="button" class="btn btn-warning px-4 py-2 shadow rounded-pill fw-bold"
                    data-bs-toggle="modal" data-bs-target="#agregarUsuarioModal">
                <i class="fa-solid fa-user-plus"></i> [[#{usuario.agregar}]]
            </button>
        </div>
    </div>

    <div class="modal fade" id="agregarUsuarioModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow rounded-4">

                <div class="modal-header bg-warning text-dark rounded-top-4">
                    <h4 class="modal-title fw-bold">
                        <i class="fa-solid fa-users"></i> Nuevo Usuario
                    </h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action='@{/usuario/guardar}' th:object='${usuario}'
                      class='was-validated' enctype="multipart/form-data" method="post">

                    <div class="modal-body p-4">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Usuario</label>
                                <input type="text" name='username' class='form-control rounded-3' required/>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Contraseña</label>
                                <input type="password" name='password' class='form-control rounded-3' required/>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Nombre</label>
                                <input type="text" name='nombre' class='form-control rounded-3' required/>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Apellidos</label>
                                <input type="text" name='apellidos' class='form-control rounded-3' required/>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Correo</label>
                                <input type="email" name='correo' class='form-control rounded-3' required/>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Teléfono</label>
                                <input type="tel" name='telefono' class='form-control rounded-3'/>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-bold d-block">Activo</label>
                                <input type="checkbox" name='activo' class='form-check-input'/>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Imagen</label>
                                <input type="file" name='imagenFile' onchange='mostrarImagen(this);'
                                       class='form-control rounded-3'/>
                            </div>
                        </div>

                        <div class="text-center mt-3">
                            <img id='blah' src='#' alt='preview' height="180" class="rounded shadow-sm"/>
                        </div>
                    </div>

                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-warning rounded-pill px-4 fw-bold">
                            Guardar Usuario
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<section th:fragment="listado" class="container mt-4">
    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-dark text-warning rounded-top-4 py-3">
            <h3 class="mb-0 fw-bold">
                <i class="fa-solid fa-users"></i> [[#{usuario.listado}]]
            </h3>
        </div>

        <div class="card-body">
            <div th:if="${usuarios != null and !usuarios.empty}">
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-warning">
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Apellidos</th>
                                <th>Teléfono</th>
                                <th>Correo</th>
                                <th>Imagen</th>
                                <th>Estado</th>
                                <th sec:authorize="hasRole('ADMIN')">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${usuarios}">
                                <td>[[${u.idUsuario}]]</td>
                                <td>[[${u.nombre}]]</td>
                                <td>[[${u.apellidos}]]</td>
                                <td>[[${u.telefono}]]</td>
                                <td>[[${u.correo}]]</td>
                                <td>
                                    <img th:src="@{${u.rutaImagen}}" height="60"
                                         class="rounded-circle shadow-sm"/>
                                </td>
                                <td>
                                    <span th:text="${u.activo} ? 'Activo':'Inactivo'"
                                          class="badge rounded-pill"
                                          th:classappend="${u.activo} ? ' bg-success' : ' bg-danger'">
                                    </span>
                                </td>
                                <td sec:authorize="hasRole('ADMIN')">
                                    <a th:href="@{/usuario/modificar/}+${u.idUsuario}"
                                       class="btn btn-warning btn-sm rounded-pill me-1">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:action="@{/usuario/eliminar(idUsuario=${u.idUsuario})}"
                                          method="post" class="d-inline">
                                        <button type="submit" class="btn btn-danger btn-sm rounded-pill">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="text-center py-4 text-muted" th:if="${usuarios == null or usuarios.empty}">
                <i class="fa-solid fa-circle-info"></i> [[#{lista.vacia}]]
            </div>
        </div>
    </div>

    <div th:replace="~{usuario/fragmentos :: confirmarEliminar}"></div>
</section>

<section th:fragment="editar">
    <div class="container py-5">
        <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 800px;">

            <div class="card-header bg-warning text-dark text-center rounded-top-4">
                <h3 class="fw-bold">
                    <i class="fa-solid fa-user-pen"></i> Editar Usuario
                </h3>
            </div>

            <form method="POST" th:action="@{/usuario/guardar}" 
                  th:object="${usuario}" enctype="multipart/form-data">

                <input type="hidden" th:field="*{idUsuario}"/>
                <input type="hidden" th:field="*{rutaImagen}"/>

                <div class="card-body p-4">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="fw-bold">Usuario</label>
                            <input type="text" th:field="*{username}" class="form-control rounded-3"/>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="fw-bold">Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control rounded-3"/>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="fw-bold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control rounded-3"/>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="fw-bold">Apellidos</label>
                            <input type="text" th:field="*{apellidos}" class="form-control rounded-3"/>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="fw-bold">Correo</label>
                            <input type="email" th:field="*{correo}" class="form-control rounded-3"/>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="fw-bold">Teléfono</label>
                            <input type="tel" th:field="*{telefono}" class="form-control rounded-3"/>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="fw-bold d-block">Activo</label>
                            <input class="form-check-input" type="checkbox" th:field="*{activo}"/>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="fw-bold">Imagen</label>
                            <input class="form-control rounded-3" type="file" name="imagenFile"/>
                        </div>
                    </div>

                    <div class="text-center mt-3">
                        <img th:src="@{${usuario.rutaImagen}}" height="180"
                             class="rounded-circle shadow"/>
                    </div>
                </div>

                <div class="card-footer bg-white border-0 text-center pb-4">
                    <a th:href="@{/usuario/listado}" class="btn btn-secondary rounded-pill px-4">
                        Regresar
                    </a>
                    <button type="submit" class="btn btn-warning rounded-pill px-4 fw-bold">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<section th:fragment="confirmarEliminar">
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">

                <form th:action="@{/usuario/eliminar}" method="post">
                    <input type="hidden" name="idUsuario" id="modalId"/>

                    <div class="modal-header bg-warning text-dark rounded-top-4">
                        <h5 class="modal-title fw-bold">
                            <i class="fa-solid fa-triangle-exclamation"></i> Confirmar Acción
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body text-center">
                        <p class="fs-5">¿Seguro que quieres eliminar este usuario?</p>
                    </div>

                    <div class="modal-footer border-0 justify-content-center">
                        <button type="submit" class="btn btn-danger rounded-pill px-4">
                            Eliminar
                        </button>
                        <button type="button" class="btn btn-secondary rounded-pill px-4"
                                data-bs-dismiss="modal">
                            Cancelar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</section>
