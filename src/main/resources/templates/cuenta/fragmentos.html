    <div th:fragment="loginForm">

        <div class="card shadow-sm p-4 text-center">

            <div class="d-flex justify-content-center mb-3">

                <img th:if="${session.imagenUsuario != null}"
                     th:src="${session.imagenUsuario}"
                     class="rounded-circle"
                     style="width:100px; height:100px; object-fit:cover;"/>

                <i th:if="${session.imagenUsuario == null}"
                   class="fas fa-user-circle fa-5x text-primary"></i>

            </div>

            <h4 class="fw-bold" sec:authentication="name"></h4>
            <p class="text-muted">Cuenta de usuario</p>

            <hr>

            <div class="text-start">
                <p>
                    <i class="fas fa-user me-2"></i>
                    Usuario: <span sec:authentication="name"></span>
                </p>

                <p>
                    <i class="fas fa-shield-alt me-2"></i>
                    Estado: <span class="text-success">Activo</span>
                </p>
            </div>

            <hr>

            <div class="d-grid gap-2">

                           th:value="${_csrf.token}" />

                    <button class="btn btn-danger w-100">
                        Cerrar sesión
                    </button>
                </form>

            </div>

        </div>

    <!-- ===================== -->
    <!-- FRAGMENTO: REGISTRO   -->
    <!-- ===================== -->
<div th:fragment="registroForm">

    <div class="container mt-5">
        <h1>Crear cuenta</h1>
    </div>

    <div class="card p-4 shadow mx-auto" style="max-width:450px;">

        <h4 class="text-center mb-3">Registro</h4>

        <form th:action="@{/registro}" th:object="${usuario}" method="post">

            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}" required>
            </div>

            <div class="mb-3">
                <label>Apellidos</label>
                <input type="text" class="form-control" th:field="*{apellidos}" required>
            </div>

            <div class="mb-3">
                <label>Teléfono</label>
                <input type="text" class="form-control" th:field="*{telefono}">
            </div>

            <div class="mb-3">
                <label>Correo</label>
                <input type="email" class="form-control" th:field="*{correo}" required>
            </div>

            <div class="mb-3">
                <label>Usuario</label>
                <input type="text" class="form-control" th:field="*{username}" required>
            </div>

            <div class="mb-3">
                <label>Contraseña</label>
                <input type="password" class="form-control" th:field="*{password}" required>
            </div>

            <button type="submit" class="btn btn-warning w-100">
                Registrarse
            </button>

        </form>

    </div>
</div>
