<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- ===================== -->
    <!-- FRAGMENTO: CUENTA     -->
    <!-- ===================== -->
    <section th:fragment="cuenta">

        <div class="container mt-5">
            <h1>Cuenta</h1>
        </div>

    </section>


    <!-- ===================== -->
    <!-- FRAGMENTO: PERFIL     -->
    <!-- ===================== -->
    <div th:fragment="loginForm">

        <div class="card shadow-sm p-4 text-center">

            <div class="d-flex justify-content-center mb-3">
                <i class="fas fa-user-circle fa-5x text-primary"></i>
            </div>

            <h4 class="fw-bold" sec:authentication="name"></h4>

            <p class="text-muted">Cuenta de usuario</p>

            <hr>

            <div class="text-start">

                <p>
                    <i class="fas fa-user me-2"></i>
                    Usuario: <span sec:authentication="name"></span>
                </p>

                <p>
                    <i class="fas fa-shield-alt me-2"></i>
                    Estado: <span class="text-success">Activo</span>
                </p>

            </div>

            <hr>

            <div class="d-grid gap-2">

                <a th:href="@{/editar-cuenta}" class="btn btn-outline-primary">
                    Editar perfil
                </a>

                <a th:href="@{/carrito}" class="btn btn-outline-dark">
                    Ver carrito
                </a>

                <form th:action="@{/logout}" method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <button class="btn btn-danger w-100">
                        Cerrar sesión
                    </button>

                </form>

            </div>

        </div>

    </div>


    <!-- ===================== -->
    <!-- FRAGMENTO: REGISTRO   -->
    <!-- ===================== -->
    <div th:fragment="registroForm">

        <div class="container mt-5">
            <h1>Crear cuenta</h1>
        </div>

        <div class="card p-4 shadow mx-auto" style="max-width:450px;">

            <h4 class="text-center mb-3">Registro</h4>

            <form th:action="@{/registro}" method="post">

                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" name="nombreCompleto">
                </div>

                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" name="telefono">
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" class="form-control" name="correo">
                </div>

                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" class="form-control" name="usuario">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="password">
                </div>

                <button type="submit" class="btn btn-warning w-100">
                    Registrarse
                </button>

            </form>

        </div>

    </div>

</html>
