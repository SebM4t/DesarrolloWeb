<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro</title>

    <th:block th:replace="~{general/fragments :: head_recursos}"></th:block>
</head>

<body>

<nav th:replace="~{general/fragments :: navbar}"></nav>

<div class="container py-5">

    <div class="card p-4 shadow mx-auto" style="max-width:450px;">

        <h4 class="text-center mb-3">Crear cuenta</h4>

        <form th:action="@{/registro}" method="post">

            
            <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input type="text" class="form-control" name="nombreCompleto">
            </div>

          
            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="tel" class="form-control" name="telefono">
            </div>

            
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" name="correo">
            </div>

            
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" name="usuario">
            </div>

            
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password">
            </div>

            
            <button type="submit" class="btn btn-warning w-100">
                Registrarse
            </button>

        </form>

    </div>

</div>

<footer th:replace="~{general/fragments :: footer}"></footer>

</body>
</html>
