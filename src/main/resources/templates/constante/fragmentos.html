
<section th:fragment="agregar">

    <div class="text-center my-4">
        <button type="button"
                class="btn btn-warning fw-bold shadow-sm px-4"
                sec:authorize="hasRole('ADMIN')"
                data-bs-toggle="modal"
                data-bs-target="#agregarConstanteModal">
            <i class="fa-solid fa-plus"></i> Agregar Constante
        </button>
    </div>

    <div class="modal fade" id="agregarConstanteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-md">
            <div class="modal-content rounded-4 shadow">

                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title fw-bold">
                        <i class="fa-solid fa-sliders"></i> Nueva Constante
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{/constante/guardar}" th:object="${constante}" method="post" class="was-validated">
                    <div class="modal-body">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Atributo</label>
                            <input type="text" class="form-control rounded-3" name="atributo" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Valor</label>
                            <input type="text" class="form-control rounded-3" name="valor" required>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark"></i> Cerrar
                        </button>
                        <button type="submit" class="btn btn-warning rounded-3 fw-bold">
                            <i class="fa-solid fa-floppy-disk"></i> Guardar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</section>

<section th:fragment="listado" class="container py-4">

    <div class="card border-0 shadow rounded-4">
        <div class="card-header bg-warning text-dark rounded-top-4">
            <h4 class="mb-0 fw-bold">
                <i class="fa-solid fa-table-list"></i> Lista de Constantes
            </h4>
        </div>

        <div class="card-body">

            <div th:if="${constantes != null and !constantes.empty}">
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Atributo</th>
                                <th>Valor</th>
                                <th sec:authorize="hasRole('ADMIN')">Acciones</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="c : ${constantes}">
                                <td class="fw-bold">[[${c.idConstante}]]</td>
                                <td>[[${c.atributo}]]</td>
                                <td>[[${c.valor}]]</td>

                                <td sec:authorize="hasRole('ADMIN')">
                                    <div class="d-flex justify-content-center gap-2">

                                        <a th:href="@{/constante/modificar/{id}(id=${c.idConstante})}"
                                           class="btn btn-warning btn-sm shadow-sm rounded-3">
                                            <i class="fas fa-edit"></i>
                                        </a>

                                        <form th:action="@{/constante/eliminar}" method="post"
                                              onsubmit="return confirm('¿Está seguro de eliminar esta constante?')">
                                            <input type="hidden" name="idConstante" th:value="${c.idConstante}" />

                                            <button type="submit"
                                                    class="btn btn-danger btn-sm shadow-sm rounded-3">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>

                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>

<section th:fragment="editar" class="container py-5">

    <div class="card shadow border-0 rounded-4 mx-auto" style="max-width: 700px;">

        <div class="card-header bg-warning text-dark rounded-top-4">
            <h4 class="mb-0 fw-bold">
                <i class="fa-solid fa-pen-to-square"></i> Editar Constante
            </h4>
        </div>

        <div class="card-body">

            <form method="POST"
                  th:action="@{/constante/guardar}"
                  th:object="${constante}"
                  class="was-validated">

                <input type="hidden" th:field="*{idConstante}"/>

                <div class="mb-3">
                    <label class="form-label fw-bold">Atributo</label>
                    <input type="text" class="form-control rounded-3" th:field="*{atributo}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Valor</label>
                    <input type="text" class="form-control rounded-3" th:field="*{valor}" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/constante/listado}" class="btn btn-secondary rounded-3">
                        <i class="fas fa-arrow-left"></i> Regresar
                    </a>

                    <button type="submit" class="btn btn-warning fw-bold rounded-3">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </div>

            </form>
        </div>
    </div>
</section>
