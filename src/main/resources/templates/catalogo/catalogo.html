<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Catálogo</title>
    <th:block th:replace="~{general/fragments :: head_recursos}"></th:block>
</head>

<body>
    <nav th:replace="~{general/fragments :: navbar}"></nav>

    <div class="container mt-4">
        <h2 class="mb-5 fw-bold text-center">Catálogo de Productos</h2>

        <div class="row">
            <div class="col-md-6">
                <h4 class="text-center mb-3">Placas Conmemorativas</h4>
                <div class="row">
                    <div class="col-6 mb-4" th:each="placa : ${placas}">
                        <div class="card h-100 shadow-sm">
                            <div class="card-img-top bg-light" style="height: 150px;"></div>
                            <div class="card-body">
                                <h6 class="card-title fw-bold" th:text="${placa.nombre}">Nombre</h6>
                                <p class="card-text small text-muted" th:text="${placa.material}">Material</p>
                            </div>
                            <div class="card-footer bg-white border-0">
                                <a th:href="@{'/catalogo/' + ${placa.id}}" class="btn btn-sm btn-outline-dark w-100">Ver detalle</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <h4 class="text-center mb-3">Trofeos y Reconocimientos</h4>
                <div class="row">
                    <div class="col-6 mb-4" th:each="trofeo : ${trofeos}">
                        <div class="card h-100 shadow-sm">
                            <div class="card-img-top bg-light" style="height: 150px;"></div>
                            <div class="card-body">
                                <h6 class="card-title fw-bold" th:text="${trofeo.nombre}">Nombre</h6>
                                <p class="card-text small text-muted" th:text="${trofeo.material}">Material</p>
                            </div>
                            <div class="card-footer bg-white border-0">
                                <a th:href="@{'/catalogo/' + ${trofeo.id}}" class="btn btn-sm btn-outline-dark w-100">Ver detalle</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{general/fragments :: footer}"></footer>
</body>
</html>
