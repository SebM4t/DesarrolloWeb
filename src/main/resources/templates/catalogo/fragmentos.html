<!DOCTYPE html>
<section th:fragment="catalogoProducto">
    <div class="container mt-4">
        <h2 class="mb-5 fw-bold text-center">Catálogo de Productos</h2>

        <div class="row">
            <div class="col-md-8">
                <h4 class="text-center mb-3">Placas Conmemorativas</h4>
                <div class="row">
                    <div class="col-6 mb-4" th:each="placa : ${placas}">
                        <div class="card h-100 shadow-sm">
                            <div class="card-img-top bg-light" style="height: 150px;"></div>
                            <div class="card-body">
                                <h6 class="card-title fw-bold" th:text="${placa.nombre}">Nombre</h6>
                                <p class="card-text small text-muted" th:text="${placa.material}">Material</p>
                            </div>
                            <div class="card-footer bg-white border-0">
                                <a th:href="@{'/catalogo/' + ${placa.idPlaca}}" class="btn btn-sm btn-outline-dark w-100">Ver detalle</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <h4 class="text-center mb-3">Trofeos y Reconocimientos</h4>
                <div class="row">
                    <div class="col-6 mb-4" th:each="trofeo : ${trofeos}">
                        <div class="card h-100 shadow-sm">
                            <div class="card-img-top bg-light" style="height: 150px;"></div>
                            <div class="card-body">
                                <h6 class="card-title fw-bold" th:text="${trofeo.nombre}">Nombre</h6>
                                <p class="card-text small text-muted" th:text="${trofeo.material}">Material</p>
                            </div>
                            <div class="card-footer bg-white border-0">
                                <a th:href="@{'/catalogo/' + ${trofeo.idPlaca}}" class="btn btn-sm btn-outline-dark w-100">Ver detalle</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Para la página detalle -->
<section th:fragment="detalleProducto">

    <div class="container mt-5 p-5 bg-warning rounded">
        <h2 class="text-center mb-4">DETALLE DEL PRODUCTO</h2>
        
        <div class="row">
            <div class="col-md-6">
                <img th:src="${placa.imagenNombre}" class="img-fluid" alt="Placa"/>
            </div>
            <div class="col-md-6">
                <h3 th:text="${placa.nombre}">Nombre</h3>
                <p class="h4" th:text="'₡' + ${placa.precio}">Precio</p>
                
                <h5>Características</h5>
                <p th:text="${placa.material}">Material</p>
                <p th:text="${placa.tamanio}">Tamaño</p>
                
                <div class="mt-4">
                    <button class="btn btn-success">AÑADIR AL CARRITO</button>
                    <a href="/catalogo" class="btn btn-danger">REGRESAR</a>
                </div>
            </div>
        </div>
    </div>
</section>
