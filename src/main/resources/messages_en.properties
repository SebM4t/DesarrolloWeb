inicio.titulo_placa=Build your plaque
inicio.placa_descripcion=The "Build your plaque" section allows the user to fully customize their commemorative or recognition plaque. Here you can choose material, size, shape, typography, icons, and a personalized message, viewing each change in real time.
inicio.titulo_reconocimientos=Awards
inicio.reconocimiento_descripcion=The "Awards" section allows users to create plaques intended to celebrate achievements, merits, or thanks. Here they can select predefined models, customize messages, choose typography styles and colors, and add decorative elements that reinforce the purpose of the award.
inicio.titulo_mascotas=Pet Plaques
inicio.mascotas_descripcion=The "Pet Plaques" section is designed for users to create identification or commemorative plaques for their animals. It offers options for shape, size, material, and engraving, as well as icons and visual elements related to pets.
inicio.titulo_historia=History
inicio.historia_descripcion="Fundici\u00f3n Jim\u00e9nez" and "La Casa de la Placa" are family businesses founded in the 90s in Concepci\u00f3n Arriba de Alajuelita by Mr. Jorge Jim\u00e9nez Jim\u00e9nez, as a necessity to survive and meet the need for local commemorative plaques and corporate/student awards. "La Casa de la Placa" was created as a solution to the high demand for commemorative plaques during the pandemic, as the current owners realized they couldn't keep up with requests and production. By separating sales from production, they established a continuous and smooth business line to receive requests.
