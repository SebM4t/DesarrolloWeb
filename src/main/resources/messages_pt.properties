inicio.titulo_placa=Monte sua placa
inicio.placa_descripcion=A se\u00e7\u00e3o "Monte sua placa" permite ao usu\u00e1rio personalizar completamente sua placa comemorativa ou de reconhecimento. Aqui pode escolher o material, tamanho, forma, tipografia, \u00edcones e mensagem personalizada, visualizando cada mudan\u00e7a em tempo real.
inicio.titulo_reconocimientos=Reconhecimentos
inicio.reconocimiento_descripcion=A se\u00e7\u00e3o "Reconhecimentos" permite aos usu\u00e1rios criar placas destinadas a celebrar conquistas, m\u00e9ritos ou agradecimentos. Aqui podem selecionar modelos predefinidos, personalizar mensagens, escolher estilos de tipografia e cores, e adicionar elementos decorativos que reforcem o prop\u00f3sito do reconhecimento.
inicio.titulo_mascotas=Placas para Pets
inicio.mascotas_descripcion=A se\u00e7\u00e3o "Placas para pets" foi projetada para que os usu\u00e1rios criem placas de identifica\u00e7\u00e3o ou comemorativas para seus animais. Oferece op\u00e7\u00f5es de forma, tamanho, material e grava\u00e7\u00e3o, al\u00e9m de \u00edcones e elementos visuais relacionados a pets.
inicio.titulo_historia=Hist\u00f3ria
inicio.historia_descripcion=A "Fundici\u00f3n Jim\u00e9nez" e a "La Casa de la Placa" s\u00e3o empresas familiares fundadas nos anos 90 em Concepci\u00f3n Arriba de Alajuelita, pelo senhor Jorge Jim\u00e9nez Jim\u00e9nez, como necessidade para sobreviver e atender \u00e0 demanda de placas comemorativas da regi\u00e3o e reconhecimentos empresariais e estudantis. "La Casa de la Placa" foi criada como solu\u00e7\u00e3o \u00e0 alta demanda de placas comemorativas durante a pandemia, pois os propriet\u00e1rios atuais perceberam que n\u00e3o davam conta de receber solicita\u00e7\u00f5es e produzir. Separando as vendas da produ\u00e7\u00e3o, conseguiram estabelecer uma linha de neg\u00f3cio cont\u00ednua e sem problemas para receber solicita\u00e7\u00f5es.
