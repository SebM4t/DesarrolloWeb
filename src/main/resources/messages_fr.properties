inicio.titulo_placa=Cr\u00e9ez votre plaque
inicio.placa_descripcion=La section "Cr\u00e9ez votre plaque" permet \u00e0 l'utilisateur de personnaliser enti\u00e8rement sa plaque comm\u00e9morative ou de reconnaissance. Ici, vous pouvez choisir le mat\u00e9riau, la taille, la forme, la typographie, les ic\u00f4nes et le message personnalis\u00e9, en visualisant chaque changement en temps r\u00e9el.
inicio.titulo_reconocimientos=Distinctions
inicio.reconocimiento_descripcion=La section "Distinctions" permet aux utilisateurs de cr\u00e9er des plaques destin\u00e9es \u00e0 c\u00e9l\u00e9brer des r\u00e9ussites, des m\u00e9rites ou des remerciements. Ici, ils peuvent s\u00e9lectionner des mod\u00e8les pr\u00e9d\u00e9finis, personnaliser les messages, choisir les styles de typographie et les couleurs, et ajouter des \u00e9l\u00e9ments d\u00e9coratifs qui renforcent le but de la reconnaissance.
inicio.titulo_mascotas=Plaques pour animaux
inicio.mascotas_descripcion=La section "Plaques pour animaux" est con\u00e7ue pour que les utilisateurs cr\u00e9ent des plaques d'identification ou comm\u00e9moratives pour leurs animaux. Elle propose des options de forme, taille, mat\u00e9riau et gravure, ainsi que des ic\u00f4nes et des \u00e9l\u00e9ments visuels li\u00e9s aux animaux de compagnie.
inicio.titulo_historia=Histoire
inicio.historia_descripcion="Fundici\u00f3n Jim\u00e9nez" et "La Casa de la Placa" sont des entreprises familiales fond\u00e9es dans les ann\u00e9es 90 \u00e0 Concepci\u00f3n Arriba de Alajuelita par M. Jorge Jim\u00e9nez Jim\u00e9nez, par n\u00e9cessit\u00e9 de survivre et de r\u00e9pondre au besoin de plaques comm\u00e9moratives locales et de distinctions d'entreprises et d'\u00e9tudiants. "La Casa de la Placa" a \u00e9t\u00e9 cr\u00e9\u00e9e comme solution \u00e0 la forte demande de plaques comm\u00e9moratives pendant la pand\u00e9mie, car les propri\u00e9taires actuels se sont rendu compte qu'ils ne pouvaient pas r\u00e9pondre \u00e0 toutes les demandes et produire en m\u00eame temps. En s\u00e9parant les ventes de la production, ils ont r\u00e9ussi \u00e0 \u00e9tablir une ligne commerciale continue et sans probl\u00e8me pour recevoir les demandes.
