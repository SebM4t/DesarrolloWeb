inicio.titulo_placa=Arma tu placa
inicio.placa_descripcion=La secci\u00f3n "Arma tu placa" permite al usuario personalizar completamente su placa conmemorativa o reconocimiento. Aqu\u00ed puede elegir el material, tama\u00f1o, forma, tipograf\u00eda, \u00edconos y mensaje personalizado, visualizando cada cambio en tiempo real.
inicio.titulo_reconocimientos=Reconocimientos
inicio.reconocimiento_descripcion=La secci\u00f3n "Reconocimientos" permite a los usuarios crear placas destinadas a celebrar logros, m\u00e9ritos o agradecimientos. Aqu\u00ed pueden seleccionar modelos predefinidos, personalizar mensajes, elegir estilos de tipograf\u00eda y colores, y a\u00f1adir elementos decorativos que refuercen el prop\u00f3sito del reconocimiento.
inicio.titulo_mascotas=Placas para Mascotas
inicio.mascotas_descripcion=La secci\u00f3n "Placas para mascotas" est\u00e1 dise\u00f1ada para que los usuarios creen placas identificativas o conmemorativas para sus animales. Ofrece opciones de forma, tama\u00f1o, material y grabado, adem\u00e1s de \u00edconos y elementos visuales relacionados con mascotas.
inicio.titulo_historia=Historia
inicio.historia_descripcion=La "Fundici\u00f3n Jim\u00e9nez" y "La Casa de la Placa" son empresas familiares fundadas en los a\u00f1os 90 en Concepci\u00f3n Arriba de Alajuelita, por el se\u00f1or Jorge Jim\u00e9nez Jim\u00e9nez, como necesidad para sobrevivir y solventar la necesidad de placas conmemorativas de la zona y reconocimientos empresariales y estudiantiles. "La Casa de la Placa" fue creada como soluci\u00f3n a la alta demanda de placas conmemorativas en pandemia, ya que los due\u00f1os actuales se dieron cuenta de que no daban a basto recibiendo solicitudes y produciendo. Separando las ventas de la producci\u00f3n lograron establecer una l\u00ednea de negocio continua y sin problemas para recibir solicitudes.
